name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Generate Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew


      - name: Restore Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release-upload.jks


      - name: Build arm64 Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-upload.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}

        run: |
          ./gradlew assembleRelease


      - name: Verify APK ABI
        run: |
          unzip -l app/build/outputs/apk/release/*.apk | grep arm64


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arm64-release-apk
          path: app/build/outputs/apk/release/*.apk
