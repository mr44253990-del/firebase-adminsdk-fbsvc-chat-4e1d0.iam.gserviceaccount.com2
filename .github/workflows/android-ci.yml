name: Android Release CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release-upload.jks
          chmod 600 release-upload.jks

      - name: Show release certificate fingerprints
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          keytool -list -v \
            -keystore release-upload.jks \
            -alias "$RELEASE_KEY_ALIAS" \
            -storepass "$RELEASE_STORE_PASSWORD" \
            | grep -E "SHA1:|SHA-1:|SHA256:|SHA-256:"

      - name: Build signed arm64-v8a release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-upload.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Verify release signature and ABI
        run: |
          set -euo pipefail
          APK="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' -print -quit)"
          test -n "$APK"

          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner" verify --verbose --print-certs "$APK"

          mapfile -t ABIS < <(unzip -Z1 "$APK" | sed -n 's#^lib/\([^/]*\)/.*#\1#p' | sort -u)
          printf 'Packaged native ABIs: %s\n' "${ABIS[*]:-none}"
          if ((${#ABIS[@]} > 0)); then
            test "${#ABIS[@]}" -eq 1
            test "${ABIS[0]}" = "arm64-v8a"
          fi

          mv "$APK" app/build/outputs/apk/release/FireChat-v2.0.3-arm64-v8a-release.apk
          sha256sum app/build/outputs/apk/release/FireChat-v2.0.3-arm64-v8a-release.apk \
            | tee app/build/outputs/apk/release/FireChat-v2.0.3-arm64-v8a-release.apk.sha256

      - name: Upload signed arm64-v8a release APK
        uses: actions/upload-artifact@v4
        with:
          name: FireChat-v2.0.3-arm64-v8a-release
          path: |
            app/build/outputs/apk/release/FireChat-v2.0.3-arm64-v8a-release.apk
            app/build/outputs/apk/release/FireChat-v2.0.3-arm64-v8a-release.apk.sha256
          if-no-files-found: error
          retention-days: 30
